      <stop stop-color="#031525"/>
      <stop offset="0.52" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#134E4A"/>
    </linearGradient>
    <linearGradient id="panel" x1="300" y1="260" x2="1300" y2="1760" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.20)"/>
