<?xml version="1.0" encoding="UTF-8"?>
<svg width="1600" height="2000" viewBox="0 0 1600 2000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="160" y1="120" x2="1450" y2="1880" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.5" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#082F49"/>
    </linearGradient>
    <linearGradient id="panel" x1="340" y1="300" x2="1260" y2="1700" gradientUnits="userSpaceOnUse">
      <stop stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0.08)"/>
    </linearGradient>
    <radialGradient id="orb1" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 260) rotate(48) scale(420)">
      <stop stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1320 1720) rotate(48) scale(520)">
      <stop stop-color="#38BDF8" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#020617" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="2000" fill="url(#bg)"/>
  <circle cx="250" cy="260" r="420" fill="url(#orb1)" filter="url(#blur)"/>
  <circle cx="1320" cy="1720" r="520" fill="url(#orb2)" filter="url(#blur)"/>

  <g filter="url(#shadow)">
    <rect x="170" y="170" width="1260" height="1660" rx="56" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.18)"/>
    <rect x="170" y="170" width="1260" height="1660" rx="56" fill="url(#panel)"/>
  </g>

  <text x="800" y="400" text-anchor="middle" fill="#CFFAFE" font-size="38" font-weight="700" letter-spacing="10">TAX CONFERENCE QUESTION WALL</text>
  <text x="800" y="535" text-anchor="middle" fill="#FFFFFF" font-size="128" font-weight="800">扫码提问</text>
  <text x="800" y="620" text-anchor="middle" fill="rgba(255,255,255,0.72)" font-size="42" font-weight="500">匿名提交，实时进入大会问题池</text>

  <rect x="400" y="730" width="800" height="800" rx="44" fill="#FFFFFF"/>
  <image href="data:image/png;base64," x="470" y="800" width="660" height="660" preserveAspectRatio="xMidYMid meet"/>

  <rect x="455" y="1568" width="690" height="94" rx="47" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.28)"/>
  <text x="800" y="1628" text-anchor="middle" fill="#E0F2FE" font-size="34" font-weight="700">打开 H5 提问页</text>

  <text x="800" y="1752" text-anchor="middle" fill="rgba(255,255,255,0.60)" font-size="28" font-weight="500">https://ask.shutterpilot.top/h5/</text>
</svg>